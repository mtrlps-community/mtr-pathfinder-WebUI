{% extends 'base.html' %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- 左侧：时刻表表单 -->
    <div class="lg:col-span-1">
        <div class="card">
            <h2 class="text-2xl font-bold mb-6">时刻表查询</h2>
            
            <form id="timetable-form">
                <!-- 车站 -->
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2" for="timetable-station">
                        <i class="fa-solid fa-train-station mr-1"></i> 车站名/车站ID
                    </label>
                    <textarea id="timetable-station" name="station" class="form-input" placeholder="输入车站名称或ID" required></textarea>
                </div>
                
                <!-- 路线 -->
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2" for="timetable-routes">
                        <i class="fa-solid fa-route mr-1"></i> 路线（分号分隔）
                    </label>
                    <textarea id="timetable-routes" name="routes" class="form-input" placeholder="输入要查询的路线，以分号分隔"></textarea>
                </div>
                
                <!-- 出发方向 -->
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2" for="timetable-direction">
                        <i class="fa-solid fa-compass mr-1"></i> 出发方向编号
                    </label>
                    <input type="number" id="timetable-direction" name="direction" class="form-input" placeholder="输入出发方向编号">
                </div>
                
                <!-- 时间 -->
                <div class="mb-4">
                    <label class="block text-gray-700 font-medium mb-2" for="timetable-time">
                        <i class="fa-solid fa-clock mr-1"></i> 时间
                    </label>
                    <p class="text-sm text-gray-500 mb-2">指定一个具体的时间，格式为 HH:MM:SS</p>
                    <input type="time" id="timetable-time" class="form-input" placeholder="选择时间" step="1">
                </div>
                
                <!-- 文字模式 -->
                <div class="mb-6">
                    <label class="flex items-center p-2 rounded-md cursor-pointer transition-colors" style="background-color: var(--bg-tertiary);">
                        <input type="checkbox" id="timetable-text-mode" name="text_mode" class="form-checkbox" style="accent-color: var(--accent-primary);">
                        <span class="ml-2" style="color: var(--text-primary);">文字模式</span>
                    </label>
                </div>
                
                <!-- 查询按钮 -->
                <div class="flex space-x-3">
                    <button type="submit" class="btn-primary flex-1">
                        <i class="fa-solid fa-search mr-2"></i> 查询时刻表
                    </button>
                    <button type="reset" class="btn-secondary">
                        <i class="fa-solid fa-rotate-right mr-2"></i> 重置
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 右侧：结果展示 -->
    <div class="lg:col-span-2">
        <div class="card">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">时刻表查询结果</h2>
            </div>
            
            <!-- 初始提示状态 -->
            <div id="initial-prompt" class="text-center py-16">
                <i class="fa-solid fa-clock text-5xl mb-4" style="color: var(--text-tertiary);"></i>
                <h3 class="text-xl font-semibold mb-2" style="color: var(--text-secondary);">请输入参数</h3>
                <p style="color: var(--text-tertiary);">在左侧填写相应参数，点击"查询时刻表"开始查询</p>
            </div>
            
            <!-- 加载状态 -->
            <div id="loading" class="hidden py-12">
                <div class="max-w-md mx-auto">
                    <h3 class="text-lg font-semibold mb-4 text-center" style="color: var(--text-primary);">正在处理请求</h3>
                    <div class="mb-4">
                        <div class="w-full rounded-full h-2.5 mb-2" style="background-color: var(--bg-tertiary);">
                            <div id="progress-bar" class="h-2.5 rounded-full" style="background-color: var(--accent-primary); width: 0%"></div>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span id="progress-stage" style="color: var(--text-secondary);">准备中...</span>
                            <span id="progress-percentage" style="color: var(--text-secondary);">0%</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 错误信息 -->
            <div id="error" class="hidden px-4 py-3 rounded mb-4" style="background-color: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text);"></div>
            
            <!-- 结果区域 -->
            <div id="result" class="hidden">
                <!-- 时刻表结果 -->
                <div id="timetable-result" class="space-y-4">
                    <!-- 时刻表结果将动态生成 -->
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // 时刻表表单提交处理
    const timetableForm = document.getElementById('timetable-form');
    if (timetableForm) {
        timetableForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 显示加载状态，隐藏其他状态
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('initial-prompt').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
            document.getElementById('result').classList.add('hidden');
            
            // 收集表单数据
            const formData = new FormData(timetableForm);
            
            const data = {
                station: formData.get('station'),
                routes: formData.get('routes').split(/[,;；]/).map(s => s.trim()).filter(Boolean),
                direction: formData.get('direction') || null,
                time: formData.get('time') || null,
                text_mode: formData.get('text_mode') === 'on'
            };
            
            try {
                // 发送请求
                const response = await fetch('/api/timetable', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const resultData = await response.json();
                
                // 隐藏加载状态
                document.getElementById('loading').classList.add('hidden');
                
                if (response.ok) {
                    if (resultData.error) {
                        // 显示错误信息
                        document.getElementById('error').textContent = resultData.error;
                        document.getElementById('error').classList.remove('hidden');
                    } else {
                        // 填充结果
                        const timetableResult = document.getElementById('timetable-result');
                        if (data.text_mode) {
                            // 文字模式结果
                            timetableResult.innerHTML = `<pre style="white-space: pre-wrap; padding: 1rem; background-color: var(--bg-tertiary); border-radius: 0.5rem;">${resultData.result}</pre>`;
                        } else {
                            // HTML模式结果
                            let htmlContent = resultData.result;
                            // 替换模板变量为实际的CSS文件路径
                            htmlContent = htmlContent.replace(/\{\{\s*url_for\('static',\s*filename='([^']+)'\s*\)\s*\}\}/g, '/static/$1');
                            timetableResult.innerHTML = htmlContent;
                        }
                        
                        // 延迟显示结果，确保HTML内容完全加载和渲染
                        setTimeout(() => {
                            document.getElementById('result').classList.remove('hidden');
                        }, 100);
                    }
                } else {
                    // API返回错误状态码
                    document.getElementById('error').textContent = resultData.error || '网络错误，请稍后重试';
                    document.getElementById('error').classList.remove('hidden');
                }
            } catch (err) {
                // 网络错误或其他异常
                console.error('时刻表查询错误:', err);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').textContent = `查询错误: ${err.message || '网络错误，请稍后重试'}`;
                document.getElementById('error').classList.remove('hidden');
            }
        });
    }
    
    // 时刻表表单重置按钮
    const timetableResetButton = document.querySelector('#timetable-form button[type="reset"]');
    if (timetableResetButton) {
        timetableResetButton.addEventListener('click', function() {
            // 显示初始提示，隐藏所有结果相关元素
            document.getElementById('initial-prompt').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
        });
    }
</script>
{% endblock %}
